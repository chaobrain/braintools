coverage:
  precision: 2
  round: down
  range: "85...95"
  status:
    project:
      default:
        # The project aims to keep test coverage above 90%.
        target: 90%
        threshold: 1%
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  require_changes: false
